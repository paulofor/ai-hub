services:
  caddy:
    image: ${CADDY_IMAGE:-ghcr.io/${GHCR_USERNAME:-paulofor}/ai-hub-caddy:latest}
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
      - sandbox-orchestrator
      - mcp-server
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:-localhost}
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      default:
      public-net:
        aliases:
          - aihub-caddy
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/${GHCR_USERNAME:-paulofor}/ai-hub-backend:latest}
    build:
      context: ./apps/backend
    command: >
      /bin/sh -c "if [ -f /run/secrets/openai-token/openai_api_key ]; then
        export OPENAI_API_KEY=$(cat /run/secrets/openai-token/openai_api_key);
      fi;
      exec java -jar /app/app.jar"
    env_file:
      - apps/backend/.env.example
      - .env
    depends_on:
      - sandbox-orchestrator
      - mcp-server
    volumes:
      - ./infra:/infra
      - ${OPENAI_TOKEN_HOST_DIR:-/root/infra/openai-token}:/run/secrets/openai-token:ro
    networks:
      default:
        aliases:
          - backend
  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/${GHCR_USERNAME:-paulofor}/ai-hub-frontend:latest}
    build:
      context: ./apps/frontend
    env_file:
      - apps/frontend/.env.example
      - .env
    depends_on:
      - backend
    networks:
      default:
      public-net:
        aliases:
          - aihub-frontend
  sandbox-orchestrator:
    image: ${SANDBOX_ORCHESTRATOR_IMAGE:-ghcr.io/${GHCR_USERNAME:-paulofor}/ai-hub-sandbox:latest}
    build:
      context: ./apps/sandbox-orchestrator
    env_file:
      - apps/sandbox-orchestrator/.env.example
      - .env
    volumes:
      - ${OPENAI_TOKEN_HOST_DIR:-/root/infra/openai-token}:/run/secrets/openai-token:ro
      - ${SANDBOX_WORKDIR:-/root/ai-hub/infra/src}:${SANDBOX_WORKDIR:-/root/ai-hub/src}
    command: >
      /bin/sh -c "if [ -f /run/secrets/openai-token/openai_api_key ]; then
        export OPENAI_API_KEY=$(cat /run/secrets/openai-token/openai_api_key);
      fi;
      exec node dist/src/index.js"
    networks:
      default:
        aliases:
          - sandbox-orchestrator
      public-net:
        aliases:
          - sandbox-orchestrator
  mcp-server:
    image: ${MCP_SERVER_IMAGE:-ghcr.io/${GHCR_USERNAME:-paulofor}/ai-hub-mcp-server:latest}
    build:
      context: ./apps/mcp-server
    env_file:
      - .env
    environment:
      MCP_SERVER_API_TOKEN: ${MCP_SERVER_API_TOKEN:-change-me}
    networks:
      default:
        aliases:
          - mcp-server

networks:
  default:
  public-net:
    external: true

volumes:
  caddy-data:
  caddy-config:
